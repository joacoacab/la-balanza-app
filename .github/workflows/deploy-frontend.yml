name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"

jobs:
  build-deploy:
    name: Build y deploy frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias y buildear
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copiar dist al servidor
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          rsync -avz --delete \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            frontend/dist/ \
            ubuntu@3.224.47.11:/home/ubuntu/la-balanza-frontend/
          rm /tmp/deploy_key

      - name: Restart Nginx
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@3.224.47.11 \
            "docker compose -f /home/ubuntu/la-balanza/docker-compose.prod.yml restart nginx"
          rm /tmp/deploy_key
